<main>

<section class="card">
<h2>恋愛診断</h2>

<input id="nickname" placeholder="ニックネーム">

<select id="gender">

<option>女性</option>
</select>

<input id="mbti" placeholder="MBTI（例: ENFP）">

<textarea id="type" placeholder="理想のタイプ"></textarea>

<button onclick="diagnose()">診断する</button>

<section id="result" class="card" style="display:none;">
<h2>診断結果</h2>

<p id="resultAge"></p>
<p id="resultMbti"></p>
<p id="resultPersonality"></p>
